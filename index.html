<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dawood | Portfolio</title>
    <style>
        /* CSS Reset & Base */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            cursor: none; /* Hides default cursor for the custom dot */
        }
        
        body {
            background-color: #0a0a0a;
            color: #eaeaea;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            line-height: 1.6;
        }
        
        /* Custom Cursor */
        .cursor-dot {
            width: 8px;
            height: 8px;
            background-color: #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: transform 0.15s ease-out, background-color 0.15s ease-out;
        }

        /* Layout Container */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 120px 24px;
        }

        /* Typography */
        h1 { 
            font-size: 4rem; 
            font-weight: 300; 
            letter-spacing: -1.5px; 
            margin-bottom: 8px; 
        }
        
        h2 { 
            font-size: 1.25rem; 
            font-weight: 400; 
            color: #777; 
            margin-bottom: 60px; 
        }
        
        /* Section Styling */
        section { 
            margin-bottom: 80px; 
        }
        
        .section-label { 
            font-size: 0.85rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: #444; 
            margin-bottom: 24px; 
        }
        
        .philosophy-text { 
            font-size: 1.75rem; 
            font-weight: 300; 
            line-height: 1.4; 
            color: #ccc; 
        }

        /* Contact Links */
        .contact-list { 
            list-style: none; 
        }
        
        .contact-list li { 
            margin-bottom: 16px; 
            font-size: 1.1rem; 
            color: #aaa;
        }
        
        a { 
            color: #eaeaea; 
            text-decoration: none; 
            position: relative; 
            transition: color 0.3s ease; 
        }
        
        a:hover { 
            color: #777; 
        }
        
        /* Minimal Footer with no copyright text */
        footer {
            margin-top: 100px;
            padding-top: 40px;
            border-top: 1px solid #1a1a1a;
        }
        
        /* Responsive adjustments */
        @media (max-width: 600px) {
            h1 { font-size: 3rem; }
            .philosophy-text { font-size: 1.4rem; }
            .container { padding: 80px 20px; }
            * { cursor: auto; } /* Disable custom cursor on mobile */
            .cursor-dot { display: none; }
        }
    </style>
</head>
<body>

    <div class="cursor-dot" id="cursor"></div>

    <div class="container">
        <header>
            <h1>Dawood</h1>
            <h2>Data Science & Development</h2>
        </header>

        <section>
            <div class="section-label">Philosophy</div>
            <p class="philosophy-text">"Data should be clear, not complex or unprofessional."</p>
        </section>

        <section>
            <div class="section-label">Contact</div>
            <ul class="contact-list">
                <li>Email: <a href="mailto:dawoodtahiir@gmail.com">dawoodtahiir@gmail.com</a></li>
                <li>Phone: ahmed aza 03195999585</li>
                <li>GitHub: <a href="https://github.com/DawoodTahir505" target="_blank" rel="noopener noreferrer">DawoodTahir505</a></li>
                <li>LinkedIn: <a href="https://www.linkedin.com/in/dawood-tahir-3854a035a" target="_blank" rel="noopener noreferrer">Dawood Tahir</a></li>
            </ul>
        </section>
        
        <footer>
            </footer>
    </div>

    <script>
        // Custom Cursor Logic
        const cursor = document.getElementById('cursor');
        
        // Update cursor position
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Grow cursor when hovering over links
        const links = document.querySelectorAll('a');
        links.forEach(link => {
            link.addEventListener('mouseenter', () => {
                cursor.style.transform = 'translate(-50%, -50%) scale(2.5)';
                cursor.style.backgroundColor = '#777';
            });
            link.addEventListener('mouseleave', () => {
                cursor.style.transform = 'translate(-50%, -50%) scale(1)';
                cursor.style.backgroundColor = '#fff';
            });
        });
    </script>
</body>
</html>
