<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dawood | Data Scientist</title>
    <style>
        /* Ultra-Clean Modern Reset */
        :root {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --text-secondary: #888888;
            --accent: #ffffff;
            --font-main: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Minimal Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 30px 5vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%);
        }

        .nav-logo {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: -0.02em;
            text-decoration: none;
            color: var(--text-primary);
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--text-primary);
        }

        /* Layout */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 5vw;
        }

        section {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Hero Typography */
        h1 {
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: 500;
            letter-spacing: -0.04em;
            line-height: 1;
            margin-bottom: 20px;
        }

        .role {
            font-size: clamp(1.5rem, 3vw, 2.5rem);
            color: var(--text-secondary);
            font-weight: 400;
            letter-spacing: -0.02em;
        }

        /* Section Headers */
        h2 {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 500;
            letter-spacing: -0.03em;
            margin-bottom: 60px;
            color: var(--text-primary);
        }

        /* Skills Layout */
        .skills-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-top: 1px solid #222;
            padding-top: 40px;
        }

        .skill-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #222;
            font-size: clamp(1.2rem, 2.5vw, 2rem);
            color: var(--text-secondary);
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .skill-item:hover {
            color: var(--text-primary);
            transform: translateX(10px);
        }

        /* Contact Layout */
        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        .contact-block {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .contact-label {
            font-size: 0.85rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .contact-link {
            font-size: clamp(1.5rem, 3.5vw, 2.5rem);
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 400;
            transition: opacity 0.3s ease;
            width: fit-content;
        }

        .contact-link:hover {
            opacity: 0.6;
        }

        /* Animations */
        .fade-up {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 1s cubic-bezier(0.16, 1, 0.3, 1), transform 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .fade-up.in-view {
            opacity: 1;
            transform: translateY(0);
        }

        /* Empty Footer Spacing */
        footer {
            height: 150px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="#" class="nav-logo">Dawood.</a>
        <div class="nav-links">
            <a href="#skills">Skills</a>
            <a href="#contact">Contact</a>
        </div>
    </nav>

    <div class="container">
        <section id="hero">
            <div class="fade-up">
                <h1>Dawood.</h1>
                <div class="role">Data Scientist.</div>
            </div>
        </section>

        <section id="skills">
            <div class="fade-up">
                <h2>Expertise</h2>
                <div class="skills-list">
                    <div class="skill-item">Data Analysis <span>01</span></div>
                    <div class="skill-item">Python <span>02</span></div>
                    <div class="skill-item">Pandas & NumPy <span>03</span></div>
                    <div class="skill-item">Matplotlib & Seaborn <span>04</span></div>
                    <div class="skill-item">FastAPI <span>05</span></div>
                </div>
            </div>
        </section>

        <section id="contact">
            <div class="fade-up">
                <h2>Let's Talk.</h2>
                <div class="contact-info">
                    <div class="contact-block">
                        <span class="contact-label">Email</span>
                        <a href="mailto:dawoodtahiir@gmail.com" class="contact-link">dawoodtahiir@gmail.com</a>
                    </div>
                    <div class="contact-block">
                        <span class="contact-label">Phone</span>
                        <a href="tel:+923195999585" class="contact-link">0319-5999585</a>
                    </div>
                    <div class="contact-block">
                        <span class="contact-label">Professional Profile</span>
                        <a href="https://www.linkedin.com/in/dawood-tahir-3854a035a" target="_blank" rel="noopener noreferrer" class="contact-link">LinkedIn</a>
                    </div>
                    <div class="contact-block">
                        <span class="contact-label">Code Repository</span>
                        <a href="https://github.com/DawoodTahir505" target="_blank" rel="noopener noreferrer" class="contact-link">GitHub</a>
                    </div>
                </div>
            </div>
        </section>

        <footer></footer>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const observerOptions = {
                root: null,
                rootMargin: '0px',
                threshold: 0.15
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('in-view');
                    }
                });
            }, observerOptions);

            const fadeElements = document.querySelectorAll('.fade-up');
            fadeElements.forEach(el => observer.observe(el));

            // Trigger hero section immediately
            setTimeout(() => {
                const heroFade = document.querySelector('#hero .fade-up');
                if(heroFade) heroFade.classList.add('in-view');
            }, 50);
        });
    </script>
</body>
</html>
